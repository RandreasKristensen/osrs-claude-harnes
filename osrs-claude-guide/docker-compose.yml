version: '3.8'

services:
  osrs-guide:
    build:
      context: .
      dockerfile: services/osrs-guide/Dockerfile
    ports:
      - "8081:8080"
    networks:
      - osrs-claude-net

  monitor:
    build:
      context: .
      dockerfile: services/monitor/Dockerfile
    ports:
      - "8082:8080"
    volumes:
      - monitor-data:/data
    networks:
      - osrs-claude-net

networks:
  osrs-claude-net:
    driver: bridge

volumes:
  monitor-data:
